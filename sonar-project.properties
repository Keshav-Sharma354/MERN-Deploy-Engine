sonar.projectKey=mern-deploy-engine
sonar.organization=keshav-sharma354
sonar.projectName=MERN Deploy Engine
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=./mern

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude coverage and test files from analysis
sonar.exclusions=**/node_modules/**,**/*.spec.js,**/*.test.js,**/build/**,**/dist/**

# Coverage reporting for JavaScript/TypeScript (if available in future)
sonar.javascript.lcov.reportPaths=./mern/frontend/coverage/lcov.info,./mern/backend/coverage/lcov.info
